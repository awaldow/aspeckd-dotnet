name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.tfm }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - tfm: net8.0
            dotnet-version: '8.0.x'
            dotnet-quality: 'ga'
          - tfm: net9.0
            dotnet-version: '9.0.x'
            dotnet-quality: 'ga'
          - tfm: net10.0
            dotnet-version: '10.0.x'
            dotnet-quality: 'preview'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ matrix.dotnet-version }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}
          dotnet-quality: ${{ matrix.dotnet-quality }}

      - name: Restore
        run: dotnet restore Aspeckd.sln

      - name: Build
        # Each matrix job builds only its target TFM so that each job is fully isolated.
        run: dotnet build Aspeckd.sln --no-restore --configuration Release --framework ${{ matrix.tfm }}

      - name: Test
        run: >
          dotnet test Aspeckd.sln --no-build --configuration Release
          --framework ${{ matrix.tfm }}
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          --results-directory TestResults

      - name: Generate coverage report
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          reportgenerator \
            -reports:"TestResults/**/coverage.cobertura.xml" \
            -targetdir:"TestResults/CoverageReport" \
            -reporttypes:"HtmlInline;Cobertura"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.tfm }}
          path: TestResults/**/*.trx

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.tfm }}
          path: TestResults/CoverageReport/
