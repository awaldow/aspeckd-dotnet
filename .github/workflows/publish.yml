name: Publish NuGet

on:
  release:
    types: [published]

# contents: read is the minimum required to checkout the repo.
# id-token: write is required for NuGet.org Trusted Publishing via OIDC.
# attestations: write is required for build provenance and SBOM attestations.
permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  publish:
    name: Pack & Publish to NuGet.org
    runs-on: ubuntu-latest
    # Route to the appropriate GitHub Environment so that NuGet.org Trusted
    # Publishing can be scoped per environment and optional approval gates can
    # be added later.  Pre-releases (e.g. alpha/beta/rc tags) go to the
    # "prerelease" environment; all other published releases go to "release".
    environment: ${{ github.event.release.prerelease && 'prerelease' || 'release' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history is required so that MinVer can walk the git graph and
          # derive the correct package version from the nearest semver tag.
          fetch-depth: 0
          # fetch-tags is required alongside fetch-depth: 0 to ensure all tags
          # are fetched; without it MinVer cannot see the release tag and falls
          # back to the default 0.0.0-alpha.0.N version.
          fetch-tags: true

      # Install all three SDK generations so that `dotnet pack` can build every
      # TargetFramework listed in the .csproj files (net8.0, net9.0, net10.0).
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup .NET 10 (preview)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore Aspeckd.sln

      - name: Derive package version from release tag
        # Release tags are expected to be semver with an optional leading 'v'
        # (e.g. v1.2.3 or 1.2.3-rc.1). Strip a leading 'v' so NuGet receives
        # a valid package version.
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "PACKAGE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Using package version: $VERSION"

      - name: Validate derived package version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${PACKAGE_VERSION:-}"
          if [[ -z "$VERSION" ]]; then
            echo "::error::PACKAGE_VERSION is empty — cannot pack."
            exit 1
          fi
          # Basic semver: 1.2.3, 1.2.3-rc.1, or 1.2.3+build.1
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::PACKAGE_VERSION '$VERSION' is not a valid semver-like version."
            exit 1
          fi
          # Block MinVer fallback versions
          if [[ "$VERSION" == "0.0.0" || "$VERSION" == 0.0.0-* ]]; then
            echo "::error::Refusing to publish fallback version '$VERSION'."
            exit 1
          fi
          echo "Validated PACKAGE_VERSION=$VERSION"

      - name: Validate release/prerelease alignment
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${PACKAGE_VERSION}"
          IS_PRERELEASE="${{ github.event.release.prerelease }}"
          if [[ "$IS_PRERELEASE" == "true" && "$VERSION" != *-* ]]; then
            echo "::error::GitHub release is marked pre-release but version '$VERSION' has no pre-release suffix."
            exit 1
          fi
          if [[ "$IS_PRERELEASE" == "false" && "$VERSION" == *-* ]]; then
            echo "::error::GitHub release is marked stable but version '$VERSION' contains a pre-release suffix."
            exit 1
          fi
          echo "Release type and version suffix are aligned (prerelease=$IS_PRERELEASE, version=$VERSION)."

      - name: Diagnose version inputs
        shell: bash
        run: |
          echo "=== Recent git tags ==="
          git tag --sort=-creatordate | head -20
          echo ""
          echo "=== git describe ==="
          git describe --tags --always
          echo ""
          echo "=== MSBuild version properties (Aspeckd) ==="
          dotnet msbuild src/Aspeckd/Aspeckd.csproj \
            -p:Version=${{ env.PACKAGE_VERSION }} \
            -p:PackageVersion=${{ env.PACKAGE_VERSION }} \
            -p:MinVerVersionOverride=${{ env.PACKAGE_VERSION }} \
            -getProperty:Version \
            -getProperty:PackageVersion \
            -getProperty:MinVerVersion 2>/dev/null || true
          echo ""
          echo "=== MSBuild version properties (Aspeckd.Core) ==="
          dotnet msbuild src/Aspeckd.Core/Aspeckd.Core.csproj \
            -p:Version=${{ env.PACKAGE_VERSION }} \
            -p:PackageVersion=${{ env.PACKAGE_VERSION }} \
            -p:MinVerVersionOverride=${{ env.PACKAGE_VERSION }} \
            -getProperty:Version \
            -getProperty:PackageVersion \
            -getProperty:MinVerVersion 2>/dev/null || true

      - name: Pack
        # Version, PackageVersion, and MinVerVersionOverride are all forced from
        # the release tag so MinVer's fallback (0.0.0-alpha.0.N) can never win.
        run: >
          dotnet pack Aspeckd.sln
          --no-restore
          --configuration Release
          -p:Version=${{ env.PACKAGE_VERSION }}
          -p:PackageVersion=${{ env.PACKAGE_VERSION }}
          -p:MinVerVersionOverride=${{ env.PACKAGE_VERSION }}
          --output artifacts/

      - name: Generate SBOM
        # Generates a SPDX 2.2 SBOM for the packed NuGet artifacts.
        # The manifest is written to artifacts/_manifest/spdx_2.2/manifest.spdx.json.
        uses: microsoft/sbom-tool@v2
        with:
          BuildDropPath: artifacts/
          PackageName: Aspeckd
          PackageVersion: ${{ env.PACKAGE_VERSION }}
          PackageSupplier: aspeckd contributors
          ManifestDirPath: artifacts/

      - name: Attest build provenance
        # Creates a SLSA provenance attestation for every .nupkg and associates
        # it with this workflow run via GitHub's attestation store.
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: artifacts/*.nupkg

      - name: Attest SBOM
        # Attaches the generated SPDX SBOM as an attestation for the .nupkg files.
        uses: actions/attest-sbom@v2
        with:
          subject-path: artifacts/*.nupkg
          sbom-path: artifacts/_manifest/spdx_2.2/manifest.spdx.json

      - name: Authenticate to NuGet.org (Trusted Publishing)
        # NuGet/login handles the OIDC token exchange and sets NUGET_AUTH_TOKEN.
        # See: https://learn.microsoft.com/nuget/nuget-org/trusted-publishing#github-actions-setup
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        # --skip-duplicate prevents errors if a package with the same version
        # was already uploaded (e.g. a re-run of a failed workflow).
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --source https://api.nuget.org/v3/index.json
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --skip-duplicate
