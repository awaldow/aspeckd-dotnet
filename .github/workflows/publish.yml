name: Publish NuGet

on:
  release:
    types: [published]

# contents: read is the minimum required to checkout the repo.
# id-token: write is required for NuGet.org Trusted Publishing via OIDC.
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Pack & Publish to NuGet.org
    runs-on: ubuntu-latest
    # Route to the appropriate GitHub Environment so that NuGet.org Trusted
    # Publishing can be scoped per environment and optional approval gates can
    # be added later.  Pre-releases (e.g. alpha/beta/rc tags) go to the
    # "prerelease" environment; all other published releases go to "release".
    environment: ${{ github.event.release.prerelease && 'prerelease' || 'release' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history is required so that MinVer can walk the git graph and
          # derive the correct package version from the nearest semver tag.
          fetch-depth: 0
          # fetch-tags is required alongside fetch-depth: 0 to ensure all tags
          # are fetched; without it MinVer cannot see the release tag and falls
          # back to the default 0.0.0-alpha.0.N version.
          fetch-tags: true

      # Install all three SDK generations so that `dotnet pack` can build every
      # TargetFramework listed in the .csproj files (net8.0, net9.0, net10.0).
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup .NET 10 (preview)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore Aspeckd.sln

      - name: Derive package version from release tag
        # Release tags are expected to be semver with an optional leading 'v'
        # (e.g. v1.2.3 or 1.2.3-rc.1). Strip a leading 'v' so NuGet receives
        # a valid package version.
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "PACKAGE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Using package version: $VERSION"

      - name: Pack
        # The test project has <IsPackable>false/> so only the two source
        # projects (Aspeckd and Aspeckd.Core) will produce .nupkg files.
        # Set PackageVersion explicitly from the published release tag to keep
        # CI output deterministic even if MinVer cannot resolve git metadata.
        run: >
          dotnet pack Aspeckd.sln
          --no-restore
          --configuration Release
          -p:PackageVersion=${{ env.PACKAGE_VERSION }}
          --output artifacts/

      - name: Authenticate to NuGet.org (Trusted Publishing)
        # NuGet/login handles the OIDC token exchange and sets NUGET_AUTH_TOKEN.
        # See: https://learn.microsoft.com/nuget/nuget-org/trusted-publishing#github-actions-setup
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        # --skip-duplicate prevents errors if a package with the same version
        # was already uploaded (e.g. a re-run of a failed workflow).
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --source https://api.nuget.org/v3/index.json
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --skip-duplicate
